name: CMake Multi-Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }}, ${{ matrix.build_type }}, ${{ matrix.c_compiler }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (Required to download Qt)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          host: ${{ fromJSON('{"Linux":"linux","Windows":"windows","macOS":"mac"}')[runner.os] }}
          target: desktop
          modules: "qtbase qttools"
          cache: true

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-randr0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Debug Qt install path
        shell: bash
        run: |
          set -euo pipefail
          command -v qmake
          qmake -v
          QT_PREFIX="$(qmake -query QT_INSTALL_PREFIX)"
          echo "QT_INSTALL_PREFIX=${QT_PREFIX}"
          echo "CMAKE_PREFIX_PATH=${QT_PREFIX}" >> "$GITHUB_ENV"

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Verify binary exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x build/LinuxLabX ]]; then
            echo "Found Linux executable"
          elif [[ -f build/Release/LinuxLabX.exe ]]; then
            echo "Found Windows Release executable"
          elif [[ -f build/LinuxLabX.exe ]]; then
            echo "Found Windows executable"
          else
            echo "LinuxLabX executable not found"
            exit 1
          fi
